<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subnix — Privacy-first network toolkit</title>
<meta name="description" content="Subnix is a privacy-first network toolkit for iPhone, iPad, and Mac. No account, no ads, no tracking.">
<style>
  :root{
    --bg:#faf7f1; --surface:#ffffff; --text:#1f1b16; --muted:#6b645a;
    --accent:#e89a2b; --accent-deep:#b9741a; --hairline:#e6dfd2;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#17140f; --surface:#201c16; --text:#f2ede3; --muted:#a89f90;
      --accent:#e89a2b; --accent-deep:#f0ad4c; --hairline:#332d24;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; min-height:100vh; align-items:center; justify-content:center; padding:32px;
  }
  .card{
    background:var(--surface); border:1px solid var(--hairline); border-radius:20px;
    padding:44px 40px; max-width:520px; width:100%; text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.04), 0 12px 40px rgba(0,0,0,.06);
  }
  .mark{display:block; margin:0 auto 20px; border-radius:14px}
  h1{font-size:30px; letter-spacing:-.02em; margin:0 0 6px}
  .tagline{color:var(--muted); margin:0 0 28px; font-size:17px}
  .btns{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:26px}
  a.btn{
    display:inline-block; text-decoration:none; font-weight:600; font-size:15px;
    padding:11px 20px; border-radius:11px; transition:transform .08s ease, background .15s ease;
  }
  a.btn.primary{background:var(--accent); color:#1f1b16}
  a.btn.primary:hover{background:var(--accent-deep)}
  a.btn.ghost{background:transparent; color:var(--text); border:1px solid var(--hairline)}
  a.btn.ghost:hover{border-color:var(--accent)}
  a.btn:active{transform:translateY(1px)}
  .foot{color:var(--muted); font-size:13px; margin:0}
  .foot a{color:var(--muted)}
  .platforms{color:var(--muted); font-size:14px; margin:0 0 22px}
</style>
</head>
<body>
  <main class="card">
    <svg class="mark" viewBox="0 0 100 100" width="56" height="56" role="img" aria-label="Subnix">
      <rect width="100" height="100" rx="22.37" fill="#1f1b16"/>
      <line x1="28" y1="72" x2="72" y2="28" stroke="#e89a2b" stroke-width="14.5" stroke-linecap="round"/>
      <circle cx="30" cy="30" r="4.6" fill="#faf7f1"/>
      <circle cx="70" cy="70" r="4.6" fill="#faf7f1"/>
    </svg>
    <h1>Subnix</h1>
    <p class="tagline">A privacy-first network toolkit.</p>
    <p class="platforms">Fourteen on-device network tools for iPhone, iPad, and Mac.<br>No account, no ads, no tracking.</p>
    <div class="btns">
      <a class="btn primary" href="privacy/">Privacy Policy</a>
      <a class="btn ghost" href="support/">Support</a>
    </div>
    <p class="foot">Source on <a href="https://github.com/westfoldsystems/Subnix">GitHub</a>.</p>
  </main>
</body>
</html>
